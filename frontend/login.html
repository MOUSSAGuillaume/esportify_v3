<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Esportify • Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">
  <a class="navbar-brand fw-semibold" href="./index.html">🎮 Esportify</a>
</nav>

<div class="container py-5" style="max-width: 520px;">
  <div class="card p-4">vb 
    
    <h1 class="h4 mb-3">Connexion</h1>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-control" placeholder="test@test.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Mot de passe</label>
      <input id="password" type="password" class="form-control" placeholder="••••••••">
    </div>

    <button id="btnLogin" class="btn btn-accent w-100">Se connecter</button>

    <div class="text-secondary small mt-3">
      (La session est en cookie PHPSESSID, et les POST envoient automatiquement le X-CSRF-TOKEN.)
    </div>
  </div>

  <div id="toastWrap" class="position-fixed bottom-0 end-0 p-3" style="z-index: 3000;"></div>
</div>

<div class="loading-center d-none" data-loading>
  <div class="spinner-border" role="status" aria-hidden="true"></div>
</div>

<script type="module">
  import { login } from "./assets/js/auth.js";
  import { setLoading, toast } from "./assets/js/ui.js";

  document.getElementById("btnLogin").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      setLoading(true);
      await login(email, password);
      toast("Connecté ✅", "success");
      setTimeout(() => location.href = "./dashboard.html", 400);
    } catch (e) {
      toast(e.message || "Erreur", "danger");
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
