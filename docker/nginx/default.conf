server {
    listen 80;
    server_name localhost;

    root /var/www/html/backend/public;
    index index.php;

    # Accueil
    location = / {
        try_files /frontend/index.html =404;
    }

    # Assets
    location ^~ /assets/ {
        alias /var/www/html/backend/public/frontend/assets/;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # Partials
    location ^~ /partials/ {
        alias /var/www/html/backend/public/frontend/partials/;
        try_files $uri =404;
    }

    # Pages frontend propres
    location / {
        try_files $uri $uri/ /frontend$uri.html /index.php?$query_string;
    }

    # PHP
    location ~ ^/index\.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/backend/public;
    }

    # Sécurité
    location ~ \.php$ {
        return 404;
    }
}