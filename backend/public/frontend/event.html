<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esportify — Détail événement</title>
    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
</head>

<body class="page-wrap">
    <header id="app-header"></header>

    <main class="container py-4">
        <a class="btn btn-link px-0 mb-3" href="./events.html">← Retour</a>

        <div id="state" class="alert alert-info d-none"></div>

        <div class="card bg-dark text-light border-secondary">
            <div class="card-body">
                <div class="d-flex justify-content-between gap-3 flex-wrap">
                    <div>
                        <h1 class="h4 fw-bold mb-1" id="title">Chargement…</h1>
                        <div class="text-secondary small" id="meta"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button id="btnRegister" class="btn btn-primary d-none">S'inscrire</button>
                        <button id="btnUnregister" class="btn btn-outline-danger d-none">Se désinscrire</button>
                        <a href="./my-events.html" class="btn btn-outline-light">Mes inscriptions</a>
                    </div>
                </div>

                <hr class="border-secondary" />

                <div class="row g-3">
                    <div class="col-12 col-lg-8">
                        <h2 class="h6">Description</h2>
                        <p class="mb-0" id="description"></p>
                    </div>

                    <div class="col-12 col-lg-4">
                        <h2 class="h6">Infos</h2>
                        <ul class="list-group">
                            <li
                                class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between">
                                <span>Date</span><span id="date"></span>
                            </li>
                            <li
                                class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between">
                                <span>Jeu</span><span id="game"></span>
                            </li>
                            <li
                                class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between">
                                <span>Ville</span><span id="city"></span>
                            </li>
                            <li
                                class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between">
                                <span>Joueurs</span><span id="slots"></span>
                            </li>
                            <li
                                class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between">
                                <span>Statut</span><span id="status"></span>
                            </li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="toastWrap" class="position-fixed bottom-0 end-0 p-3" style="z-index:3000;"></div>

    <footer id="app-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/include.js"></script>
    <script type="module" src="./assets/pages/event.js"></script>
</body>

</html>
