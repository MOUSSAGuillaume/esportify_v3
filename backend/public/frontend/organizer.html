<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Esportify — Dashboard Organisateur</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/organizer.css">
    <link rel="stylesheet" href="./assets/css/layout.css">
</head>

<!--footer -->

<body class="bg-light layout-root">
    <header id="app-header"></header>

    <!-- footer -->
    <main class="container py-4 layout-main">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
                <h1 class="h3 mb-0">Dashboard Organisateur</h1>
                <div class="text-muted">Gérer vos événements, inscriptions et démarrage.</div>
            </div>
        </div>

        <form id="filtersForm" class="card mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-12 col-md-5">
                        <label class="form-label">Recherche</label>
                        <input id="q" class="form-control" placeholder="Titre / description">
                    </div>

                    <div class="col-6 col-md-3">
                        <label class="form-label">Statut</label>
                        <select id="status" class="form-select">
                            <option value="">Tous</option>
                            <option value="PENDING">PENDING</option>
                            <option value="VALIDATED">VALIDATED</option>
                            <option value="REJECTED">REJECTED</option>
                            <option value="SUSPENDED">SUSPENDED</option>
                        </select>
                    </div>

                    <div class="col-6 col-md-2">
                        <label class="form-label">Tri</label>
                        <select id="sort" class="form-select">
                            <option value="start_desc">Date (↓)</option>
                            <option value="start_asc">Date (↑)</option>
                            <option value="players_desc">Max joueurs (↓)</option>
                            <option value="created_desc">Récents</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-2 d-grid">
                        <button class="btn btn-primary" type="submit">Filtrer</button>
                    </div>
                </div>
            </div>
        </form>

        <!--Ajoute une classe pour cibler la table si besoin -->
        <div class="card table-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div class="fw-semibold">Mes événements</div>
                <button id="refreshBtn" class="btn btn-outline-secondary btn-sm">Actualiser</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Titre</th>
                            <th>Statut</th>
                            <th>Inscrits</th>
                            <th>Début</th>
                            <th>Fin</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTbody">
                        <tr>
                            <td colspan="6" class="text-muted">Chargement…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal registrations -->
    <div class="modal fade" id="regsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle">Inscriptions</h5>
                        <div class="text-muted small" id="modalMeta"></div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <ul class="list-group" id="regsList"></ul>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <!--  footer -->
    <footer id="app-footer" class="layout-footer"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--  include -->
    <script src="./assets/js/include.js"></script>

    <!-- Dashboard JS -->
    <script type="module" src="./assets/pages/organizer.js"></script>
</body>

</html>
